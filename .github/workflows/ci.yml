name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libzstd-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build:ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

  integration-test:
    runs-on: ubuntu-24.04

    services:
      timestar:
        image: funkbuild/timestar:latest
        ports:
          - 8086:8086
        options: >-
          --health-cmd "curl -sf http://localhost:8086/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libzstd-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build:ts

      - name: Run integration tests
        run: npm test
        env:
          TIMESTAR_HOST: localhost
          TIMESTAR_PORT: 8086
