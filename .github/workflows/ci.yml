name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libzstd-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build:ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

  integration-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libzstd-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build:ts

      - name: Start TimeStar container
        run: |
          docker run -d --name timestar \
            -p 8086:8086 \
            -e TIMESTAR_OVERPROVISIONED=true \
            funkbuild/timestar:latest \
            --smp 1 --memory 512M

      - name: Wait for TimeStar to be healthy
        run: |
          echo "Waiting for TimeStar..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8086/health > /dev/null 2>&1; then
              echo "TimeStar is healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "TimeStar failed to start"
          docker logs timestar
          exit 1

      - name: Run integration tests
        run: npm test
        env:
          TIMESTAR_HOST: localhost
          TIMESTAR_PORT: 8086

      - name: TimeStar logs (on failure)
        if: failure()
        run: docker logs timestar

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, integration-test]
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libzstd-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build
        run: npm run build:ts

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Publishing version ${PKG_VERSION}"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
